id: base-default-graphify
description: Your base skills plus the default Graphify skill; Graphify index is generated fresh in each run worktree before agent execution.

materialize:
  copy:
    - from: execution/base-skills
      to: .agents/skills
    - from: execution/skills/graphify
      to: .agents/skills/graphify

pre_agent:
  setup_scope: per-run
  commands:
    - id: graphify-build
      argv:
        - graphify
        - build
      cwd: .
      timeout_seconds: 600
      required: true

expectations:
  should_verify_with_source: true
