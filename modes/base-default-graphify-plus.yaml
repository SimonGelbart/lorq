id: base-default-graphify-plus
description: Your base skills plus default Graphify and the lightweight query-planner companion skill; Graphify index is generated fresh in each run worktree.

materialize:
  copy:
    - from: execution/base-skills
      to: .agents/skills
    - from: execution/skills/graphify
      to: .agents/skills/graphify
    - from: execution/skills/graphify-query-planner
      to: .agents/skills/graphify-query-planner

pre_agent:
  setup_scope: per-run
  commands:
    - id: graphify-build
      argv:
        - graphify
        - build
      cwd: .
      timeout_seconds: 600
      required: true

expectations:
  should_verify_with_source: true
  should_avoid_generic_graph_queries: true
  max_graph_queries_before_source_fallback: 2
