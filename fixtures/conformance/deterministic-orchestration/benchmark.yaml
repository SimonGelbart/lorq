schema_version: lorq.deterministic-benchmark.v1alpha1
benchmark_id: deterministic-orchestration-v1alpha
purpose: >
  Small no-LLM migration benchmark for proving LORQ run-shard export,
  merge, judgement attachment, integrity checks, JSON report canonicalization,
  Markdown rendering, and per-case review packs.

current_slice:
  status: runnable_python_v0_agent_judge_merge_and_package_judgement_fixtures
  implemented:
    - deterministic fake agent fixture
    - deterministic fake judge fixture
    - self-contained cases, modes, prompt style, rubric, and tiny repository
    - two candidate run-shard export path under internal/generated during sessions
    - migration-only package-level merge command with expected coverage
    - package-level deterministic judgement attachment under judgements/judge-primary
  not_yet_implemented:
    - report.json and report.md rendering
    - committed golden outputs

shape:
  cases: 3
  modes: 3
  attempts_per_case_mode: 1
  shards: 2
  judgement_passes:
    - judge-primary

cases:
  - id: successful-comparison
    expected_fixture_role: successful comparison
  - id: no-final-answer
    expected_fixture_role: timeout or no_final_answer case
  - id: skipped-coverage
    expected_fixture_role: intentionally skipped cell / incomplete coverage fixture

modes:
  - id: baseline
  - id: graphify
  - id: graphify-plus

planned_shards:
  - id: shard-001
    cells:
      cases: [successful-comparison]
      modes: [baseline, graphify, graphify-plus]
  - id: shard-002
    cells:
      cases: [no-final-answer]
      modes: [baseline, graphify, graphify-plus]
    additional_partial_coverage_cells:
      cases: [skipped-coverage]
      modes: [baseline, graphify]
      intentionally_omitted:
        - skipped-coverage/graphify-plus/attempt-001

required_edge_fixtures:
  - id: duplicate-cell-conflict
    type: duplicate_cell
    expected_phase: merge
    expected_result: fail_by_default
    status: planned
  - id: fingerprint-mismatch
    type: fingerprint_mismatch
    expected_phase: merge
    expected_result: fail_by_default
    status: planned
  - id: missing-final-answer
    type: invalid_artifact
    expected_phase: package_validation
    expected_result: integrity_warning
    status: covered_by_fake_agent_fixture

adapter_contract:
  backend: deterministic-fake
  fixture_file: fixtures/fake-agent.yaml
  evidence_file: adapter.evidence.json
  result_file_after_export: cell_result.json
  final_answer_file_after_export: answer.md
  trace_file_after_export: events.normalized.jsonl
  stdout_stderr_role: logs_only

judge_contract:
  backend: deterministic-fake
  deterministic: true
  fixture_file: fixtures/fake-judge.yaml
  current_python_v0_scope: per-run optional judge adapter and merged package judgement attachment
  future_lorq_scope: merged experiment package judgement pass
  output_root: judgements/judge-primary
  quality_source: fake fixture data
