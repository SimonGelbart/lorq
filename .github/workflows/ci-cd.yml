name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python validation (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'

    defaults:
      run:
        working-directory: python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run tests
        run: python -m pytest

      - name: Validate configuration
        run: PYTHONPATH=. python -m eval_runner.cli --suite-root .. --validate-config

      - name: Run conformance suite
        run: PYTHONPATH=. python -m eval_runner.cli --run-conformance

  dotnet:
    name: .NET build and test
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore dotnet/Lorq.slnx

      - name: Build
        run: dotnet build dotnet/Lorq.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test dotnet/Lorq.slnx --configuration Release --no-build --logger "trx;LogFilePrefix=dotnet-tests" --results-directory TestResults

      - name: Upload .NET test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore

  package:
    name: Build release artifacts
    runs-on: ubuntu-latest
    needs:
      - python
      - dotnet
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Python distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build python

      - name: Publish .NET CLI
        run: |
          dotnet restore dotnet/Lorq.slnx
          dotnet publish dotnet/src/Lorq.Cli/Lorq.Cli.csproj --configuration Release --no-restore --output dotnet/artifacts/lorq-cli

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lorq-release-artifacts
          path: |
            python/dist/*
            dotnet/artifacts/lorq-cli/**
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: lorq-release-artifacts
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
